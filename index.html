<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure CAPTCHA Verification</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background: linear-gradient(135deg, #2a5c82 0%, #6a11cb 100%); min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; overflow-x: hidden; }
        .container { width: 100%; max-width: 400px; background: rgba(255,255,255,0.1); backdrop-filter: blur(10px); border-radius: 20px; overflow: hidden; box-shadow: 0 8px 32px rgba(0,0,0,0.2); animation: containerSlide 0.8s ease-out; position: relative; }
        .header { background: rgba(0,0,0,0.2); padding: 20px; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.1); position: relative; overflow: hidden; }
        .logo { width: 60px; height: 60px; background: linear-gradient(135deg, #2a5c82 0%, #6a11cb 100%); border-radius: 50%; margin: 0 auto 15px; display: flex; align-items: center; justify-content: center; font-size: 30px; color: white; animation: logoPulse 2s infinite ease-in-out; box-shadow: 0 0 20px rgba(106,17,203,0.5); }
        h1 { color: white; font-size: 24px; margin-bottom: 5px; animation: fadeIn 1s ease-out; }
        .subtitle { color: rgba(255,255,255,0.7); font-size: 14px; animation: fadeIn 1.2s ease-out; }
        .content { padding: 25px; }
        .screen { display: none; opacity: 0; transform: translateY(20px); transition: all 0.5s ease; }
        .screen.active { display: block; opacity: 1; transform: translateY(0); }
        .status { text-align: center; margin-bottom: 20px; padding: 15px; border-radius: 12px; background: rgba(255,255,255,0.1); color: white; animation: fadeIn 0.8s ease-out; }
        .status i { font-size: 30px; margin-bottom: 5px; display: block; }
        .status h2 { font-size: 20px; margin-bottom: 5px; }
        .status p { font-size: 14px; }
        .status.success { background: rgba(46,204,113,0.2); border: 1px solid rgba(46,204,113,0.3); animation: statusPulse 2s infinite; }
        .status.error { background: rgba(231,76,60,0.2); border: 1px solid rgba(231,76,60,0.3); animation: shake 0.5s ease; }
        .form-group { margin-bottom: 20px; text-align: center; }
        .input-display { display: flex; justify-content: center; gap: 10px; margin-bottom: 15px; }
        #generated-captcha { width: 100%; max-width: 200px; padding: 15px; font-size: 28px; font-weight: bold; text-align: center; border: none; border-radius: 12px; background: rgba(0,0,0,0.3); color: #2ecc71; outline: none; cursor: default; letter-spacing: 5px; transition: all 0.3s ease; box-shadow: inset 0 0 10px rgba(0,0,0,0.5); }
        #entered-captcha { width: 100%; padding: 12px; border: none; border-radius: 12px; background: rgba(255,255,255,0.9); color: #333; font-size: 16px; text-align: center; transition: all 0.3s ease; outline: none; }
        .btn { width: 100%; padding: 15px; border: none; border-radius: 12px; background: linear-gradient(135deg, #2a5c82 0%, #6a11cb 100%); color: white; font-size: 16px; font-weight: 600; cursor: pointer; transition: all 0.3s ease; margin-top: 10px; position: relative; overflow: hidden; }
        .btn-secondary { background: rgba(255,255,255,0.1); }
        .footer { text-align: center; padding: 20px; color: rgba(255,255,255,0.5); font-size: 12px; border-top: 1px solid rgba(255,255,255,0.1); }
        .floating-shapes { position: absolute; width: 100%; height: 100%; top: 0; left: 0; z-index: -1; overflow: hidden; }
        .shape { position: absolute; background: rgba(255,255,255,0.03); border-radius: 50%; }
        .shape:nth-child(1) { width: 80px; height: 80px; top: -20px; left: -20px; animation: float 15s infinite linear; }
        .shape:nth-child(2) { width: 120px; height: 120px; bottom: -50px; right: -50px; animation: float 18s infinite linear reverse; }
        .shape:nth-child(3) { width: 60px; height: 60px; top: 40%; left: 80%; animation: float 12s infinite linear; }
        .particles { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; }
        .particle { position: absolute; background: rgba(255,255,255,0.3); border-radius: 50%; animation: floatParticle 15s infinite linear; }
        @keyframes containerSlide { from { opacity: 0; transform: translateY(50px) scale(0.9); } to { opacity: 1; transform: translateY(0) scale(1); } }
        @keyframes logoPulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes statusPulse { 0% { box-shadow: 0 0 0 rgba(46,204,113,0.4); } 70% { box-shadow: 0 0 0 15px rgba(46,204,113,0); } 100% { box-shadow: 0 0 0 0 rgba(46,204,113,0); } }
        @keyframes shake { 0% { transform: translateX(0); } 20% { transform: translateX(-10px); } 40% { transform: translateX(10px); } 60% { transform: translateX(-10px); } 80% { transform: translateX(10px); } 100% { transform: translateX(0); } }
        @keyframes float { 0% { transform: translateY(0) rotate(0deg); } 50% { transform: translateY(-20px) rotate(180deg); } 100% { transform: translateY(0) rotate(360deg); } }
        @keyframes floatParticle { 0% { transform: translateY(0) translateX(0) rotate(0deg); opacity: 0; } 10% { opacity: 1; } 90% { opacity: 1; } 100% { transform: translateY(-100vh) translateX(100px) rotate(360deg); opacity: 0; } }
    </style>
</head>
<body onload="createParticles(); initializeApp();">
    <div class="container">
        <div class="floating-shapes">
            <div class="shape"></div>
            <div class="shape"></div>
            <div class="shape"></div>
        </div>
        <div class="particles" id="particles"></div>

        <div class="header">
            <div class="logo"><i class="fas fa-robot"></i></div>
            <h1>CAPTCHA Verification</h1>
            <div class="subtitle">Prove you're not a robot</div>
        </div>

        <div class="content">

            <div id="init-check-screen" class="screen active">
                <div class="status">
                    <i class="fas fa-circle-notch fa-spin"></i>
                    <h2>Checking Account Status</h2>
                    <p>Please wait...</p>
                </div>
            </div>

            <div id="captcha-screen" class="screen">
                <div class="status" id="status-box">
                    <i class="fas fa-lock"></i>
                    <h2>Complete Verification</h2>
                    <p>Please enter the code shown below.</p>
                </div>

                <div class="form-group">
                    <div class="input-display">
                        <input type="text" readonly id="generated-captcha" value="Loading...">
                    </div>
                    <div>
                        <input type="text" id="entered-captcha" placeholder="Enter the code here" autofocus>
                    </div>
                </div>

                <button type="button" onclick="check()" class="btn" id="verify-btn">
                    <i class="fas fa-check-circle"></i> Verify Code
                </button>

                <button type="button" onclick="closeApp()" class="btn" id="close-btn" style="display: none;">
                    <i class="fas fa-sign-out-alt"></i> Return to Chat
                </button>

                <button type="button" onclick="generate()" class="btn btn-secondary">
                    <i class="fas fa-sync-alt"></i> Generate New
                </button>
            </div>

        </div>

        <div class="footer">
            <p>Secure CAPTCHA System • Anti-Bot Defense</p>
        </div>
    </div>

    <script>
        let captcha;
        const alphabets = "AaBbCcDdEeFfGgHhIiJjKkLlMmNnOoPpQqRrSsTtUuVvWwXxYyZz";

        const statusBox = document.getElementById('status-box');
        const verifyBtn = document.getElementById('verify-btn');
        const closeBtn = document.getElementById('close-btn');
        const captchaScreen = document.getElementById('captcha-screen');
        const initScreen = document.getElementById('init-check-screen');

        const WebApp = window.Telegram && window.Telegram.WebApp;
        let currentUserId = null;

        const urlParams = new URLSearchParams(window.location.search);
        const WEBHOOK_URL = urlParams.get("url");

        // Get current user ID from Telegram
        if (WebApp && WebApp.initDataUnsafe && WebApp.initDataUnsafe.user) {
            currentUserId = WebApp.initDataUnsafe.user.id.toString();
            WebApp.ready();
        } else {
            // Fallback for browser testing
            currentUserId = 'DEMO_' + Math.floor(Math.random() * 10000000);
        }

        const closeApp = () => {
            if (WebApp && WebApp.close) {
                WebApp.close();
            } else {
                alert('Verification complete. Please close this window.');
            }
        };

        const showCaptcha = () => {
            initScreen.classList.remove('active');
            initScreen.style.display = 'none';
            captchaScreen.style.display = 'block';
            // Small delay to trigger CSS transition
            setTimeout(() => {
                captchaScreen.classList.add('active');
            }, 50);
            generate();
        };

        const generate = () => {
            let code = [];
            for (let i = 0; i < 6; i++) {
                if (Math.random() > 0.5) {
                    code.push(alphabets[Math.floor(Math.random() * alphabets.length)]);
                } else {
                    code.push(Math.floor(Math.random() * 10).toString());
                }
            }
            captcha = code.join('');

            document.getElementById('generated-captcha').value = captcha;
            document.getElementById('entered-captcha').value = '';
            document.getElementById('entered-captcha').focus();

            statusBox.className = 'status';
            statusBox.innerHTML = '<i class="fas fa-lock"></i><h2>Complete Verification</h2><p>Please enter the code shown above.</p>';
            verifyBtn.style.display = 'block';
            verifyBtn.disabled = false;
            closeBtn.style.display = 'none';
        };

        const initializeApp = () => {
            // Always go straight to CAPTCHA — bot handles verified check before user reaches this page
            setTimeout(() => {
                showCaptcha();
            }, 1000);
        };

        const check = async () => {
    const enteredCaptcha = document.getElementById('entered-captcha').value.trim();
    statusBox.classList.remove('success', 'error');

    if (enteredCaptcha === captcha) {
        // SUCCESS
        statusBox.classList.add('success');
        statusBox.innerHTML = '<i class="fas fa-check-circle"></i><h2>Verification Successful</h2><p>Click "Return to Chat" below.</p>';

        document.getElementById('entered-captcha').disabled = true;
        verifyBtn.style.display = 'none';
        closeBtn.style.display = 'block';

        // Generate device fingerprint
        const fingerprint = [
            navigator.userAgent,
            navigator.language,
            screen.width + "x" + screen.height,
            new Date().getTimezoneOffset()
        ].join("|");

        // Send webhook to bot
        try {
            await fetch(WEBHOOK_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    user_id: currentUserId,
                    success: true,
                    timestamp: new Date().toISOString(),
                    captcha_code: captcha,
                    device: btoa(fingerprint)
                })
            });
            console.log("Webhook sent for user:", currentUserId);
        } catch (error) {
            console.error("Webhook error:", error);
        }

    } else {
        // FAIL
        statusBox.classList.add('error');
        statusBox.innerHTML = '<i class="fas fa-exclamation-triangle"></i><h2>Verification Failed</h2><p>Code mismatch. A new CAPTCHA has been generated.</p>';
        generate();
    }
};

        function createParticles() {
            const container = document.getElementById('particles');
            container.innerHTML = '';
            for (let i = 0; i < 30; i++) {
                const p = document.createElement('div');
                p.classList.add('particle');
                const size = Math.random() * 5 + 2;
                p.style.width = size + 'px';
                p.style.height = size + 'px';
                p.style.left = (Math.random() * 100) + '%';
                p.style.bottom = '-10px';
                p.style.animationDelay = (Math.random() * 15) + 's';
                p.style.animationDuration = (Math.random() * 10 + 15) + 's';
                container.appendChild(p);
            }
        }
    </script>
</body>
</html>
