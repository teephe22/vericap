<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Secure Verification</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="https://js.hcaptcha.com/1/api.js" async defer></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }

    body {
      background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 50%, #0d0d0d 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    /* ===== AD OVERLAY ===== */
    #ad-overlay {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.75);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 999;
    }

    #ad-box {
      position: relative;
      width: 300px;
    }

    #ad-inner {
      width: 300px;
      height: 250px;
      border-radius: 10px;
      overflow: hidden;
      background: #1a1a1a;
      border: 1px solid rgba(192,192,192,0.15);
      display: flex;
      align-items: center;
      justify-content: center;
      color: rgba(192,192,192,0.4);
      font-size: 13px;
    }

    #ad-close {
      position: absolute;
      top: -12px;
      right: -12px;
      width: 28px;
      height: 28px;
      background: #c0c0c0;
      color: #111;
      border: none;
      border-radius: 50%;
      font-size: 14px;
      font-weight: bold;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.5);
      z-index: 1000;
      line-height: 1;
    }

    #ad-close:hover { background: #ffffff; }

    /* ===== MAIN CONTAINER ===== */
    .container {
      width: 100%;
      max-width: 400px;
      background: linear-gradient(145deg, rgba(40,40,40,0.95), rgba(20,20,20,0.98));
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 8px 32px rgba(0,0,0,0.6), 0 0 0 1px rgba(192,192,192,0.15);
      animation: containerSlide 0.8s ease-out;
    }

    .header {
      background: linear-gradient(135deg, #1a1a1a 0%, #2a2a2a 100%);
      padding: 25px 20px;
      text-align: center;
      border-bottom: 1px solid rgba(192,192,192,0.2);
    }

    .logo {
      width: 65px;
      height: 65px;
      background: linear-gradient(135deg, #3a3a3a 0%, #707070 100%);
      border-radius: 50%;
      margin: 0 auto 15px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 30px;
      box-shadow: 0 0 20px rgba(192,192,192,0.25), 0 0 0 2px rgba(192,192,192,0.15);
      animation: logoPulse 2s infinite ease-in-out;
    }

    .header h1 {
      color: #e8e8e8;
      font-size: 22px;
      margin-bottom: 5px;
    }

    .header p {
      color: rgba(192,192,192,0.55);
      font-size: 13px;
    }

    .content {
      padding: 25px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 18px;
    }

    .info-box {
      width: 100%;
      background: rgba(192,192,192,0.05);
      border: 1px solid rgba(192,192,192,0.12);
      border-radius: 12px;
      padding: 14px 16px;
      color: rgba(192,192,192,0.75);
      font-size: 13px;
      line-height: 1.6;
      text-align: center;
    }

    .info-box span {
      display: block;
      color: #c0c0c0;
      font-weight: 600;
      font-size: 14px;
      margin-bottom: 5px;
    }

    .captcha-wrap {
      display: flex;
      justify-content: center;
      width: 100%;
    }

    #verify-btn {
      width: 100%;
      padding: 14px;
      border: 1px solid rgba(192,192,192,0.25);
      border-radius: 12px;
      background: linear-gradient(135deg, #2a2a2a 0%, #4a4a4a 50%, #2a2a2a 100%);
      color: #d0d0d0;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 4px 15px rgba(0,0,0,0.4);
    }

    #verify-btn:hover:not(:disabled) {
      background: linear-gradient(135deg, #3a3a3a 0%, #606060 50%, #3a3a3a 100%);
      color: #ffffff;
      box-shadow: 0 4px 20px rgba(192,192,192,0.2);
    }

    #verify-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    #msg {
      width: 100%;
      text-align: center;
      padding: 12px;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 500;
      display: none;
    }

    #msg.success { display: block; background: rgba(46,204,113,0.1); border: 1px solid rgba(46,204,113,0.3); color: #2ecc71; }
    #msg.error   { display: block; background: rgba(231,76,60,0.1);  border: 1px solid rgba(231,76,60,0.3);  color: #e74c3c; }
    #msg.info    { display: block; background: rgba(192,192,192,0.07); border: 1px solid rgba(192,192,192,0.15); color: rgba(192,192,192,0.8); }

    .footer {
      text-align: center;
      padding: 16px;
      color: rgba(192,192,192,0.25);
      font-size: 11px;
      border-top: 1px solid rgba(192,192,192,0.08);
    }

    @keyframes containerSlide {
      from { opacity: 0; transform: translateY(40px) scale(0.95); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }
    @keyframes logoPulse {
      0%, 100% { box-shadow: 0 0 20px rgba(192,192,192,0.25); }
      50%       { box-shadow: 0 0 35px rgba(192,192,192,0.45); }
    }
  </style>
</head>

<body>

  <!-- ===== DISMISSIBLE AD OVERLAY ===== -->
  <div id="ad-overlay">
    <div id="ad-box">
      <button id="ad-close" onclick="closeAd()">✕</button>
      <div id="ad-inner">
        <!-- REPLACE THIS COMMENT WITH YOUR 300x250 AD SCRIPT -->
        Your 300×250 Ad Here
      </div>
    </div>
  </div>

  <!-- ===== MAIN CARD ===== -->
  <div class="container">

    <div class="header">
      <div class="logo">🤖</div>
      <h1>Account Verification</h1>
      <p>Complete the CAPTCHA to continue</p>
    </div>

    <div class="content">

      <div class="info-box">
        <span>🔒 One-Time Verification</span>
        Prove you're a real user to access the bot. This only needs to be done once per account.
      </div>

      <div class="captcha-wrap">
        <div class="h-captcha" data-sitekey="d258eb2e-8840-45d0-a92c-2b3a28ee9b42"></div>
      </div>

      <button id="verify-btn" onclick="submitVerification()">✅ Verify & Continue</button>

      <div id="msg"></div>

    </div>

    <div class="footer">Secure Verification System • VeryTaskBot</div>
  </div>

  <script>
    const WebApp = window.Telegram && window.Telegram.WebApp
    let currentUserId = null
    let isValidTelegramUser = false

    if (WebApp && WebApp.initDataUnsafe && WebApp.initDataUnsafe.user) {
      currentUserId = WebApp.initDataUnsafe.user.id.toString()
      isValidTelegramUser = true
      WebApp.ready()
      WebApp.expand()
    }

    const urlParams = new URLSearchParams(window.location.search)
    const WEBHOOK_URL = urlParams.get("url")
    const msg = document.getElementById("msg")
    const btn = document.getElementById("verify-btn")

    if (!isValidTelegramUser) {
      btn.disabled = true
      showMsg("⛔ This page can only be opened inside Telegram.", "error")
    }

    function closeAd() {
      document.getElementById("ad-overlay").style.display = "none"
    }

    function showMsg(text, type) {
      msg.textContent = text
      msg.className = type
    }

    async function submitVerification() {
      if (!isValidTelegramUser || !currentUserId) {
        showMsg("⛔ Access denied. Open this from Telegram.", "error")
        return
      }

      const captchaResponse = hcaptcha.getResponse()
      if (!captchaResponse) {
        showMsg("⚠️ Please complete the CAPTCHA first.", "error")
        return
      }

      btn.disabled = true
      btn.textContent = "⏳ Verifying..."
      showMsg("Sending verification...", "info")

      // Device fingerprint
      const fingerprintData = [
        navigator.userAgent,
        navigator.language,
        screen.width + "x" + screen.height,
        screen.colorDepth,
        new Date().getTimezoneOffset(),
        navigator.hardwareConcurrency || 0,
        navigator.platform || ""
      ].join("|")

      let hash = 0
      for (let i = 0; i < fingerprintData.length; i++) {
        let char = fingerprintData.charCodeAt(i)
        hash = ((hash << 5) - hash) + char
        hash = hash & hash
      }
      const deviceFingerprint = Math.abs(hash).toString()

      try {
        await fetch(WEBHOOK_URL, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            user_id: currentUserId,
            success: true,
            timestamp: new Date().toISOString(),
            device: deviceFingerprint
          })
        })

        showMsg("✅ Verification successful! Returning to bot...", "success")
        btn.textContent = "✅ Verified!"

        setTimeout(() => {
          if (WebApp && WebApp.close) WebApp.close()
        }, 1500)

      } catch (error) {
        console.error("Webhook error:", error)
        showMsg("❌ Something went wrong. Please try again.", "error")
        btn.disabled = false
        btn.textContent = "✅ Verify & Continue"
        hcaptcha.reset()
      }
    }
  </script>

</body>
</html>
